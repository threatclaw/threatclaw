name: Deploy to Staging

# Push to main → build images locally on the DEV forgejo-runner → save
# them as tar.gz → SCP to CASE → docker load → snapshot DB → compose up
# → smoke → rollback on failure.
#
# We use docker save/load rather than a registry push/pull because
# Forgejo's Docker registry rewrites auth realm URLs using ROOT_URL
# (http://localhost:3100/), which is unreachable from CASE. Changing
# ROOT_URL would break the human-facing Forgejo UI over SSH tunnels,
# so we skip the registry altogether. Cost: ~2 min of scp per image.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'internal/**'
      - 'docs/**'
  workflow_dispatch: {}

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build staging images on DEV
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.SHORT_SHA }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build core + dashboard images (ghcr.io tags for compose compat)
        env:
          SHA: ${{ steps.vars.outputs.SHORT_SHA }}
        run: |
          # docker-compose.yml on CASE references ghcr.io/threatclaw/core:latest,
          # so we tag locally with that exact name. The image never touches
          # ghcr.io — the -staging-<sha> tag is for local traceability.
          docker build \
            -t "ghcr.io/threatclaw/core:latest" \
            -t "tc-staging/core:${SHA}" \
            -f Dockerfile \
            .
          docker build \
            -t "ghcr.io/threatclaw/dashboard:latest" \
            -t "tc-staging/dashboard:${SHA}" \
            -f dashboard/Dockerfile \
            ./dashboard

      - name: Export images to tarball
        run: |
          docker save \
            ghcr.io/threatclaw/core:latest \
            ghcr.io/threatclaw/dashboard:latest \
            | gzip > images.tar.gz
          ls -lh images.tar.gz

      - name: Upload images artifact
        uses: actions/upload-artifact@v3
        with:
          name: staging-images
          path: images.tar.gz
          retention-days: 1

  deploy:
    name: Deploy + smoke test
    needs: build
    runs-on: ubuntu-latest
    env:
      SHA: ${{ needs.build.outputs.short_sha }}
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Download images artifact
        uses: actions/download-artifact@v3
        with:
          name: staging-images

      - name: Install SSH key
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Package deploy payload
        run: |
          mkdir -p payload/fluent-bit payload/migrations
          cp docker/docker-compose.yml            payload/
          cp docker/entrypoint.sh                 payload/
          cp docker/dashboard-entrypoint.sh       payload/ 2>/dev/null || true
          cp docker/nginx.conf                    payload/ 2>/dev/null || true
          cp docker/generate-certs.sh             payload/ 2>/dev/null || true
          cp docker/fluent-bit/*                  payload/fluent-bit/ 2>/dev/null || true
          cp migrations/V*.sql                    payload/migrations/
          cp scripts/ci/deploy-remote.sh          payload/
          cp scripts/ci/snapshot-db.sh            payload/
          cp scripts/ci/rollback.sh               payload/
          cp scripts/ci/smoke-test.sh             payload/
          chmod +x payload/*.sh
          tar czf payload.tar.gz -C payload .
          ls -lh payload.tar.gz images.tar.gz

      - name: Copy payload + images to staging
        run: |
          ssh "${STAGING_USER}@${STAGING_HOST}" 'rm -rf /tmp/tc-deploy && mkdir -p /tmp/tc-deploy'
          scp payload.tar.gz images.tar.gz "${STAGING_USER}@${STAGING_HOST}:/tmp/tc-deploy/"
          ssh "${STAGING_USER}@${STAGING_HOST}" 'tar xzf /tmp/tc-deploy/payload.tar.gz -C /tmp/tc-deploy && rm /tmp/tc-deploy/payload.tar.gz'

      - name: Load images on staging
        run: |
          ssh "${STAGING_USER}@${STAGING_HOST}" 'gunzip -c /tmp/tc-deploy/images.tar.gz | docker load && rm /tmp/tc-deploy/images.tar.gz'

      - name: Snapshot DB
        run: ssh "${STAGING_USER}@${STAGING_HOST}" 'bash /tmp/tc-deploy/snapshot-db.sh'

      - name: Deploy new images
        id: deploy
        run: |
          ssh "${STAGING_USER}@${STAGING_HOST}" \
            "SHA='${SHA}' IMAGE_TAG=loaded bash /tmp/tc-deploy/deploy-remote.sh"

      - name: Smoke test
        id: smoke
        run: ssh "${STAGING_USER}@${STAGING_HOST}" 'bash /tmp/tc-deploy/smoke-test.sh'

      - name: Rollback (DB only) on smoke failure
        if: failure() && (steps.smoke.outcome == 'failure' || steps.deploy.outcome == 'failure')
        run: ssh "${STAGING_USER}@${STAGING_HOST}" 'bash /tmp/tc-deploy/rollback.sh'

      - name: Cleanup payload on staging
        if: always()
        run: ssh "${STAGING_USER}@${STAGING_HOST}" 'rm -rf /tmp/tc-deploy' || true

      - name: Summary
        if: always()
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          {
            echo "## Staging deploy — ${SHA}"
            echo ""
            echo "- Build: ${BUILD_RESULT}"
            echo "- Deploy: ${DEPLOY_OUTCOME}"
            echo "- Smoke: ${SMOKE_OUTCOME}"
            echo ""
            if [ "${SMOKE_OUTCOME}" = "success" ]; then
              echo "🟢 Staging is on \`main-${SHA}\`"
            else
              echo "🔴 Staging rolled back. Fix forward on \`main\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
