name: ThreatClaw CI

on: [push]

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Compile check
        run: cd /srv/threatclaw && cargo check 2>&1 | tail -5

      - name: Run tests
        run: cd /srv/threatclaw && cargo test --lib 2>&1 | tail -10

      - name: Security audit
        run: cd /srv/threatclaw && cargo audit 2>&1 | tail -10 || true
