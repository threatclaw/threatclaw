[advisories]
unmaintained = "workspace"
yanked = "deny"
# All advisories below are in OPTIONAL features (libsql, bedrock, import) not
# enabled in the default production build (default = ["postgres", "html-to-markdown"]).
# Direct rustls-webpki is 0.103.12 (patched).
ignore = [
    # ── rustls-webpki 0.101.x / 0.102.x (transitive, optional features) ──
    # Pulled via aws-smithy (rustls 0.21) and libsql (rustls 0.22). Default
    # build uses 0.103.12 which is patched.
    "RUSTSEC-2026-0049",  # CRL Distribution Point bypass
    "RUSTSEC-2026-0098",  # Name constraints URI bypass
    "RUSTSEC-2026-0099",  # Name constraints wildcard bypass

    # ── Unmaintained transitives via libsql (optional `libsql`/`import`) ──
    "RUSTSEC-2025-0141",  # bincode 1.x unmaintained
    "RUSTSEC-2025-0134",  # rustls-pemfile 2.2.0 unmaintained

    # ── fxhash via wasmtime profiling (default build) ──
    # Unmaintained (not a CVE). Waiting on wasmtime migration to rustc-hash.
    "RUSTSEC-2025-0057",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
