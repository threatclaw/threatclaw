<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreatClaw — HTTPS requis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e8e4e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(208,48,32,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(208,48,32,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gp 8s ease-in-out infinite;
  }
  @keyframes gp { 0%,100%{opacity:.5} 50%{opacity:1} }
  body::after {
    content: '';
    position: absolute;
    top: 30%; left: 50%;
    transform: translate(-50%,-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(208,48,32,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .c { position: relative; z-index: 1; text-align: center; max-width: 560px; padding: 0 24px; }
  .logo {
    width: 80px; height: 80px;
    margin: 0 auto 32px;
    opacity: 0.6;
    filter: drop-shadow(0 0 20px rgba(208,48,32,0.3));
    animation: lp 4s ease-in-out infinite;
  }
  @keyframes lp { 0%,100%{opacity:.5;filter:drop-shadow(0 0 20px rgba(208,48,32,.2))} 50%{opacity:.8;filter:drop-shadow(0 0 30px rgba(208,48,32,.4))} }
  .code {
    font-size: 120px; font-weight: 800; line-height: 1; letter-spacing: -4px;
    background: linear-gradient(135deg, #d03020, #ff6050, #d03020);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gs 6s ease infinite;
    margin-bottom: 8px;
  }
  @keyframes gs { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .title { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
  .desc { font-size: 14px; font-weight: 300; color: rgba(232,228,224,0.5); line-height: 1.7; margin-bottom: 32px; }
  .card {
    background: rgba(18,18,26,0.7);
    border: 1px solid rgba(208,48,32,0.15);
    border-radius: 12px;
    padding: 20px 24px;
    text-align: left;
    backdrop-filter: blur(20px);
    margin-bottom: 32px;
  }
  .card-t { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #d03020; margin-bottom: 12px; }
  .fi {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; font-size: 13px; color: rgba(232,228,224,0.7); line-height: 1.5;
  }
  .fi + .fi { border-top: 1px solid rgba(255,255,255,0.04); }
  .fa { flex-shrink: 0; width: 16px; margin-top: 2px; color: #d03020; opacity: 0.7; }
  .fc {
    font-family: 'SF Mono','Fira Code',monospace;
    background: rgba(208,48,32,0.1);
    border: 1px solid rgba(208,48,32,0.15);
    padding: 3px 8px; border-radius: 4px;
    font-size: 12px; color: #ff6050;
    display: inline-block; margin-top: 6px;
    user-select: all; cursor: pointer;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    background: rgba(208,48,32,0.12);
    border: 1px solid rgba(208,48,32,0.25);
    border-radius: 8px;
    color: #e8e4e0; font-size: 13px; font-weight: 600;
    text-decoration: none;
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
  }
  .btn:hover {
    background: rgba(208,48,32,0.2);
    border-color: rgba(208,48,32,0.4);
    box-shadow: 0 0 20px rgba(208,48,32,0.15);
    transform: translateY(-1px);
  }
  .btn svg { width: 16px; height: 16px; }
  .sl {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: rgba(232,228,224,0.25); letter-spacing: 0.5px;
  }
  .sd { width: 6px; height: 6px; border-radius: 50%; background: #d03020; animation: db 2s ease-in-out infinite; }
  @keyframes db { 0%,100%{opacity:.3} 50%{opacity:1} }
  .scan {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(208,48,32,0.3), transparent);
    animation: sd 8s linear infinite; pointer-events: none; z-index: 10;
  }
  @keyframes sd { 0%{top:-2px} 100%{top:100vh} }
  @media(max-width:480px) { .code{font-size:80px} .title{font-size:18px} }
</style>
</head>
<body>
<div class="scan"></div>
<div class="c">

  <svg class="logo" viewBox="0 0 200 200" fill="none">
    <path d="M160 70c-10-30-40-50-70-50S40 40 30 70c-5 15-5 30 0 45 8 25 30 45 55 55 5 2 10 3 15 3s10-1 15-3c25-10 47-30 55-55 5-15 5-30 0-45z" stroke="#d03020" stroke-width="4" fill="none"/>
    <path d="M100 50c-20 0-38 12-45 30-4 10-4 22 0 32 6 18 22 32 40 40l5 2 5-2c18-8 34-22 40-40 4-10 4-22 0-32-7-18-25-30-45-30z" stroke="#d03020" stroke-width="3" fill="rgba(208,48,32,0.05)"/>
    <circle cx="90" cy="85" r="4" fill="#d03020" opacity="0.8"/>
    <path d="M70 90h60" stroke="#d03020" stroke-width="2" opacity="0.3"/>
    <path d="M75 100h50" stroke="#d03020" stroke-width="1.5" opacity="0.2"/>
  </svg>

  <div class="code">400</div>
  <div class="title">HTTPS requis</div>
  <div class="desc">Vous avez envoye une requete HTTP sur un port HTTPS. ThreatClaw exige une connexion chiffree.</div>

  <div class="card">
    <div class="card-t">Solution</div>
    <div class="fi">
      <svg class="fa" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Remplacez <b>http://</b> par <b>https://</b> dans votre barre d'adresse</span>
    </div>
    <div class="fi">
      <svg class="fa" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>
        URL correcte :
        <span class="fc" id="url"></span>
      </span>
    </div>
  </div>

  <a id="link" href="#" class="btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Acceder en HTTPS
  </a>
</div>

<div class="sl"><span class="sd"></span> ThreatClaw Agent</div>

<script>
var u = 'https://' + window.location.host + window.location.pathname;
document.getElementById('url').textContent = u;
document.getElementById('link').href = u;
</script>
</body>
</html>
