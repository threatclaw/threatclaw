# ThreatClaw — Hardened Nginx Reverse Proxy
# HTTPS termination + security headers + rate limiting + attack mitigation
#
# Single entry point: https://<hostname>/
# All other ports are closed. Core and dashboard are internal only.

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/s;

# ── Connection limits ──
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── Hide nginx version everywhere ──
server_tokens off;

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── HTTP-on-HTTPS error page ──
    error_page 497 /400.html;
    location = /400.html {
        root /usr/share/nginx/error-pages;
        internal;
    }

    # ══════════════════════════════════════════════════════════
    #  TLS HARDENING
    # ══════════════════════════════════════════════════════════

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Only TLS 1.2 and 1.3 — no SSLv3, TLS 1.0, TLS 1.1
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong ciphers only — AEAD ciphers preferred, no RC4/3DES/MD5
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;

    # ECDH curve
    ssl_ecdh_curve secp384r1;

    # Session resumption (performance + security)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;  # Disable for forward secrecy

    # OCSP stapling (if using real CA certs)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ══════════════════════════════════════════════════════════
    #  SECURITY HEADERS
    # ══════════════════════════════════════════════════════════

    # HSTS — force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking — only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy — don't leak full URL to external sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — whitelist allowed sources
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: ws:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Permissions policy — disable browser features we don't need
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Prevent caching of sensitive pages
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;

    # Don't expose what powers the backend
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ══════════════════════════════════════════════════════════
    #  ANTI-ATTACK PROTECTIONS
    # ══════════════════════════════════════════════════════════

    # Max request body size (prevent upload bombs)
    client_max_body_size 10m;

    # Slowloris protection — close slow connections
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # Max connections per IP
    limit_conn addr 50;

    # Buffer overflow protection
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # ══════════════════════════════════════════════════════════
    #  CUSTOM ERROR PAGES
    # ══════════════════════════════════════════════════════════

    ssi on;
    error_page 400 401 403 404 429 500 502 503 504 /error.html;
    location = /error.html {
        ssi on;
        root /usr/share/nginx/error-pages;
        internal;
    }

    # ══════════════════════════════════════════════════════════
    #  ROUTES
    # ══════════════════════════════════════════════════════════

    # ── Error page assets ──
    location /error-assets/ {
        alias /usr/share/nginx/error-pages/;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Login rate limit (anti brute force) ──
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://threatclaw-dashboard:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything → Dashboard (Next.js handles all routing + auth) ──
    # Nginx talks ONLY to dashboard. Dashboard proxies to core/ollama.
    # This means nginx doesn't need network access to core at all.
    # The dashboard proxies /api/tc/* and /api/auth/* to core with Bearer token
    # The dashboard proxies /api/ollama to Ollama
    # Pages go directly to Next.js
    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://threatclaw-dashboard:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # ══════════════════════════════════════════════════════════
    #  BLOCKED PATHS — attack surface reduction
    # ══════════════════════════════════════════════════════════

    # Block dotfiles (config leaks)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block common exploit paths
    location ~* ^/(wp-admin|wp-login|wordpress|phpmyadmin|admin|cgi-bin|xmlrpc\.php) {
        deny all;
        return 404;
    }

    # Block script extensions that shouldn't exist
    location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
        deny all;
        return 404;
    }

    # Block SQL injection attempts in URL
    location ~* (union.*select|insert.*into|delete.*from|drop.*table|update.*set) {
        deny all;
        return 403;
    }
}
