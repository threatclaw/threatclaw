# ThreatClaw — Fluent Bit Log Collection Pipeline
# Collects logs from multiple sources and forwards to PostgreSQL

[SERVICE]
    Flush           5
    Daemon          Off
    Log_Level       info
    Parsers_File    parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

# ── INPUT: Syslog UDP port 514 (standard) ──────────────
# Linux servers, firewalls (pfSense, FortiGate), switches
[INPUT]
    Name            syslog
    Tag             syslog.udp.*
    Listen          0.0.0.0
    Port            514
    Mode            udp
    Parser          syslog-rfc3164

# ── INPUT: Syslog TCP port 514 (reliable) ──────────────
# For servers sending via TCP (rsyslog @@)
[INPUT]
    Name            syslog
    Tag             syslog.tcp.*
    Listen          0.0.0.0
    Port            514
    Mode            tcp
    Parser          syslog-rfc5424

# ── INPUT: Syslog legacy port 5140 (backward compat) ───
[INPUT]
    Name            syslog
    Tag             syslog.legacy.*
    Listen          0.0.0.0
    Port            5140
    Mode            udp
    Parser          syslog-rfc3164

# ── INPUT: HTTP/JSON (cloud logs, scripts) ─────────────
# AWS Lambda, Azure Functions, custom scripts POST here
[INPUT]
    Name            http
    Tag             http.*
    Listen          0.0.0.0
    Port            9880

# ── INPUT: Docker container logs ─────────────────────────
[INPUT]
    Name            forward
    Tag             docker.*
    Listen          0.0.0.0
    Port            24224

# ── INPUT: Tail auth logs (bind-mounted) ─────────────────
[INPUT]
    Name            tail
    Tag             auth.log
    Path            /var/log/host/auth.log
    Parser          syslog-rfc3164
    Refresh_Interval 5
    Skip_Long_Lines On
    DB              /var/log/flb_auth.db

# ── INPUT: Tail syslog (bind-mounted) ───────────────────
[INPUT]
    Name            tail
    Tag             syslog.file
    Path            /var/log/host/syslog
    Parser          syslog-rfc3164
    Refresh_Interval 5
    Skip_Long_Lines On
    DB              /var/log/flb_syslog.db

# ── INPUT: Falco alerts via HTTP ─────────────────────────
[INPUT]
    Name            http
    Tag             falco.alerts
    Listen          0.0.0.0
    Port            8888

# ── FILTER: Add hostname ────────────────────────────────
[FILTER]
    Name            record_modifier
    Match           *
    Record          hostname ${HOSTNAME}
    Record          collector threatclaw-fluent-bit

# ── FILTER: Parse JSON from Docker logs ─────────────────
[FILTER]
    Name            parser
    Match           docker.*
    Key_Name        log
    Parser          docker_json
    Reserve_Data    On

# ── FILTER: Grep — keep only security-relevant events ───
[FILTER]
    Name            grep
    Match           auth.log
    Regex           message (Failed|Accepted|Invalid|session opened|session closed|sudo|su:|authentication failure|pam_unix)

# ── OUTPUT: PostgreSQL (via simple 3-column table) ──────
# Fluent Bit pgsql plugin expects: (tag TEXT, time TIMESTAMPTZ, data JSONB)
# We use a staging table 'logs_fluentbit' that triggers into the real 'logs' table
# See ADR-039: TLS enforced via PGSSLMODE env var (set in docker-compose)
[OUTPUT]
    Name            pgsql
    Match           *
    Host            threatclaw-db
    Port            5432
    User            threatclaw
    Password        ${TC_DB_PASSWORD}
    Database        threatclaw
    Table           logs_fluentbit
    Timestamp_Key   time

# ── OUTPUT: Stdout for debugging (dev only) ──────────────
[OUTPUT]
    Name            stdout
    Match           falco.*
    Format          json_lines
