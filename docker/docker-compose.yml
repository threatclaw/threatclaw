# ThreatClaw — Production Stack
# All data stays on-premise (Model B+)
# Docker Compose V2 — no version field required

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Core ──────────────────────────────────────────────
  threatclaw-core:
    image: threatclaw/core:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${TC_CORE_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://threatclaw:${TC_DB_PASSWORD:-threatclaw}@threatclaw-db:5432/threatclaw
      REDIS_URL: redis://redis:6379/0
      LLM_BACKEND: ollama
      OLLAMA_MODEL: ${TC_LLM_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: http://ollama:11434
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "3000"
      HTTP_HOST: "0.0.0.0"
      RUST_LOG: info
      TC_PERMISSION_LEVEL: ${TC_PERMISSION_LEVEL:-ALERT_ONLY}
      TC_INSTANCE_NAME: ${TC_INSTANCE_NAME:-threatclaw-prod}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ../AGENT_SOUL.toml:/app/AGENT_SOUL.toml:ro
      - ../threatclaw.toml:/app/threatclaw.toml:ro
      - core-data:/app/data
    depends_on:
      threatclaw-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    networks:
      - threatclaw-internal
      - threatclaw-frontend
    logging: *default-logging
    labels:
      - "com.threatclaw.role=core"
      - "com.threatclaw.security=high"

  # ── Dashboard ────────────────────────────────────────
  threatclaw-dashboard:
    image: threatclaw/dashboard:latest
    build:
      context: ../dashboard
      dockerfile: ../docker/Dockerfile.dashboard
    ports:
      - "${TC_DASHBOARD_PORT:-3001}:3000"
    environment:
      TC_CORE_URL: http://threatclaw-core:3000
      TC_CORE_TOKEN: ${TC_CORE_TOKEN:-}
    depends_on:
      - threatclaw-core
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - threatclaw-internal
      - threatclaw-frontend
    logging: *default-logging
    labels:
      - "com.threatclaw.role=dashboard"

  # ── Database ──────────────────────────────────────────
  threatclaw-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: threatclaw
      POSTGRES_USER: threatclaw
      POSTGRES_PASSWORD: ${TC_DB_PASSWORD:-threatclaw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Ollama — LLM local ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "4.0"
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - threatclaw-internal
    logging: *default-logging
    labels:
      - "com.threatclaw.role=llm"

  # ── Nuclei — CVE Scanner ────────────────────────────
  nuclei:
    image: projectdiscovery/nuclei:latest
    volumes:
      - nuclei-data:/root/.local/nuclei
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Trivy — Container Scanner ───────────────────────
  trivy:
    image: aquasec/trivy:latest
    command: ["server", "--listen", "0.0.0.0:4954"]
    volumes:
      - trivy-cache:/root/.cache/trivy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Fluent Bit — Log Collector ──────────────────────
  fluent-bit:
    image: fluent/fluent-bit:latest
    ports:
      - "127.0.0.1:5140:5140/udp"
      - "127.0.0.1:24224:24224"
    environment:
      TC_DB_PASSWORD: ${TC_DB_PASSWORD:-threatclaw}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/log:/var/log/host:ro
    depends_on:
      threatclaw-db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    networks:
      - threatclaw-internal
    logging: *default-logging

networks:
  threatclaw-internal:
    driver: bridge
    internal: true
  threatclaw-frontend:
    driver: bridge

volumes:
  pgdata:
  core-data:
  redis-data:
  ollama-data:
  nuclei-data:
  trivy-cache:
