# ╔══════════════════════════════════════════════════════════════╗
# ║  ThreatClaw v1.0.0-beta — Hardened Docker Stack              ║
# ║                                                              ║
# ║  Usage:  docker compose up -d                                ║
# ║  That's it. Everything starts, configures, and connects.     ║
# ║                                                              ║
# ║  Dashboard: https://threatclaw.local (or your hostname)      ║
# ║  API:       https://threatclaw.local/api                     ║
# ║  All data stays on-premise (Model B+)                        ║
# ║                                                              ║
# ║  Security: cap_drop ALL, no-new-privileges, read-only FS,   ║
# ║  network isolation, rate limiting, HTTPS-only                ║
# ╚══════════════════════════════════════════════════════════════╝

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# ── Shared security defaults ──
x-security-defaults: &security-defaults
  security_opt:
    - "no-new-privileges=true"
  cap_drop:
    - ALL
  ipc: private
  restart: unless-stopped

services:
  # ── Core API (Rust) ──────────────────────────────────────
  # The brain: ReAct reasoning, LLM orchestration, skill execution
  threatclaw-core:
    <<: *security-defaults
    image: ghcr.io/threatclaw/core:latest
    entrypoint: ["/app/docker/entrypoint.sh"]
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://threatclaw@threatclaw-db:5432/threatclaw?sslmode=require
      POSTGRES_USER: threatclaw
      POSTGRES_DB: threatclaw
      TC_DB_HOST: threatclaw-db
      TC_DB_PORT: "5432"
      TC_DB_PASSWORD_FILE: /run/secrets/tc_db_password
      LLM_BACKEND: ollama
      OLLAMA_MODEL: ${TC_LLM_MODEL:-threatclaw-l1}
      OLLAMA_BASE_URL: http://ollama:11434
      FORENSIC_MODEL: ${TC_FORENSIC_MODEL:-threatclaw-l2}
      TC_AUTO_PULL_MODELS: "${TC_AUTO_PULL_MODELS:-true}"
      TC_L1_MODEL: ${TC_L1_BASE_MODEL:-qwen3:8b}
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "3000"
      GATEWAY_AUTH_TOKEN_FILE: /run/secrets/tc_auth_token
      HTTP_HOST: "0.0.0.0"
      ONBOARD_COMPLETED: "true"
      RUST_LOG: info
      TC_PERMISSION_LEVEL: ${TC_PERMISSION_LEVEL:-ALERT_ONLY}
      TC_INSTANCE_NAME: ${TC_INSTANCE_NAME:-threatclaw}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      HTTP_WEBHOOK_SECRET: ${HTTP_WEBHOOK_SECRET:-}
      DOCKER_HOST: tcp://docker-proxy:2375
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=100m,mode=1700,noexec,nosuid,nodev
      - /app/cache:size=50m
    volumes:
      - ./AGENT_SOUL.toml:/app/AGENT_SOUL.toml:ro
      - ./threatclaw.toml:/app/threatclaw.toml:ro
      - ./entrypoint.sh:/app/docker/entrypoint.sh:ro
      - core-data:/app/data
      - shared-config:/shared
      # Docker socket access via proxy (See ADR-042)
      - ./certs/pg-client.crt:/app/certs/pg-client.crt:ro
      - ./certs/pg-client.key:/app/certs/pg-client.key:ro
      - ./certs/ca.crt:/app/certs/ca.crt:ro
    secrets:
      - tc_db_password
      - tc_auth_token
    depends_on:
      threatclaw-db:
        condition: service_healthy
      ollama:
        condition: service_started
      docker-proxy:
        condition: service_started
    healthcheck:
      # bash /dev/tcp built-in — works even when curl/wget aren't installed
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/127.0.0.1/3000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    networks:
      - threatclaw-internal   # DB, ML, Fluent-bit, Dashboard
      - threatclaw-egress     # Internet (APIs, Telegram, cloud LLM)
      - threatclaw-ollama     # Dedicated Ollama access
      - docker-proxy-net      # Docker socket proxy access
      - wazuh-net             # Wazuh indexer/manager (external, optional)
    logging: *default-logging
    labels:
      - "com.threatclaw.role=core"
      - "com.threatclaw.security=high"

  # ── Dashboard (Next.js) ──────────────────────────────────
  threatclaw-dashboard:
    # Security defaults applied individually (Next.js needs some capabilities)
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    ipc: private
    restart: unless-stopped
    image: ghcr.io/threatclaw/dashboard:latest
    expose:
      - "3000"
    environment:
      TC_CORE_URL: http://threatclaw-core:3000
      TC_CORE_TOKEN: ${TC_AUTH_TOKEN:-}
      OLLAMA_URL: http://ollama:11434
    # Note: read_only not used — Next.js standalone needs to write .next/cache, trace files
    tmpfs:
      - /tmp:size=50m,mode=1700,noexec,nosuid,nodev
    volumes:
      - shared-config:/shared:ro
    secrets:
      - tc_auth_token
    depends_on:
      threatclaw-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - threatclaw-internal
      - threatclaw-frontend
      - threatclaw-ollama     # Access Ollama API for model management page
    logging: *default-logging
    labels:
      - "com.threatclaw.role=dashboard"

  # ── PostgreSQL + pgvector + Apache AGE ───────────────────
  # See ADR-039: TLS enforced for all DB connections
  threatclaw-db:
    <<: *security-defaults
    image: ghcr.io/threatclaw/db:latest
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH
    environment:
      POSTGRES_DB: threatclaw
      POSTGRES_USER: threatclaw
      POSTGRES_PASSWORD_FILE: /run/secrets/tc_db_password
    read_only: true
    tmpfs:
      - /tmp:size=100m
      - /run/postgresql:size=10m
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./certs/pg-server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/pg-server.key:/var/lib/postgresql/server.key
      - ./certs/ca.crt:/var/lib/postgresql/ca.crt:ro
    command: ["postgres", "-c", "ssl=on", "-c", "ssl_cert_file=/var/lib/postgresql/server.crt", "-c", "ssl_key_file=/var/lib/postgresql/server.key", "-c", "ssl_ca_file=/var/lib/postgresql/ca.crt"]
    secrets:
      - tc_db_password
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "threatclaw", "-d", "threatclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Ollama — Local LLM ──────────────────────────────────
  ollama:
    <<: *security-defaults
    image: ollama/ollama:0.20.2
    cap_add:
      - NET_BIND_SERVICE
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      # Two slots so L0 (conversation) and L1 (triage) can stay resident
      # simultaneously. L2/L2.5 evict the LRU slot when they run, then unload
      # after their own keep_alive (30s, set per-request in call_ollama).
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_NUM_PARALLEL: "2"
      # NOTE: OLLAMA_FLASH_ATTENTION + OLLAMA_KV_CACHE_TYPE are intentionally
      # NOT set. Flash attention on CPU with Gemma 4 causes severe slowdowns
      # (Ollama issue #15395), and q8_0 KV cache requires flash attention.
      # Both are safe on modern GPUs but harmful on the older Xeons / Ryzens
      # typical of SMB deployments.
    healthcheck:
      # bash /dev/tcp — ollama image has bash but not curl/wget
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/127.0.0.1/11434'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 24G
          cpus: "6.0"
        # GPU acceleration (optional):
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: all
        #       capabilities: [gpu]
    networks:
      - threatclaw-ollama    # Dedicated network — only core can reach Ollama
      - threatclaw-egress    # Internet for model downloads
    logging: *default-logging
    labels:
      - "com.threatclaw.role=llm"

  # ── Fluent Bit — Syslog & Log Collector ─────────────────
  fluent-bit:
    <<: *security-defaults
    image: fluent/fluent-bit:3.2
    cap_add:
      - NET_BIND_SERVICE
      - DAC_READ_SEARCH
    ports:
      # Syslog: bind to specific interface if needed (default: all for network devices)
      - "${TC_SYSLOG_BIND:-0.0.0.0}:${TC_SYSLOG_PORT:-514}:514/udp"
      - "${TC_SYSLOG_BIND:-0.0.0.0}:${TC_SYSLOG_PORT:-514}:514/tcp"
      - "127.0.0.1:5140:5140/udp"
      - "127.0.0.1:24224:24224"
    read_only: true
    tmpfs:
      - /tmp:size=20m,noexec,nosuid,nodev
      - /var/log:size=50m    # Fluent-bit SQLite DB files (flb_auth.db, etc.)
    # Fluent-bit distroless image has no shell — password must be env var
    # Mitigated: container is on internal network only, no interactive access
    environment:
      TC_DB_PASSWORD: ${TC_DB_PASSWORD}
      PGSSLMODE: require
      PGSSLROOTCERT: /fluent-bit/certs/ca.crt
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./certs/ca.crt:/fluent-bit/certs/ca.crt:ro
    secrets:
      - tc_db_password
    depends_on:
      threatclaw-core:
        condition: service_healthy
    # Fluent-bit 3.2 is distroless — no curl/wget for healthcheck
    # Service health is inferred from container running + restart policy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── ML Engine — Behavioral Analysis ──────────────────────
  ml-engine:
    <<: *security-defaults
    image: ghcr.io/threatclaw/ml-engine:latest
    entrypoint: ["/bin/sh", "-c", "export DATABASE_URL=\"postgres://threatclaw:$(cat /run/secrets/tc_db_password)@threatclaw-db:5432/threatclaw?sslmode=require\" && exec python -m src.main"]
    environment:
      ML_MODEL_DIR: /models
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid,nodev
    volumes:
      - ml-models:/models
      - ./certs/ca.crt:/app/certs/ca.crt:ro
    secrets:
      - tc_db_password
    depends_on:
      threatclaw-db:
        condition: service_healthy
    healthcheck:
      # bash /dev/tcp — ml-engine image has bash but DATABASE_URL from docker env
      # does not include the Docker secret password (the entrypoint injects it
      # only into the main python process, not into docker exec health checks).
      # TCP reachability to the DB is a valid proxy for "ml-engine can work".
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/threatclaw-db/5432'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging
    labels:
      - "com.threatclaw.role=ml-engine"

  # ── Nginx Reverse Proxy (HTTPS) ────────────────────────────
  nginx:
    <<: *security-defaults
    image: nginx:1.27.4-alpine
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    ports:
      - "${TC_HTTPS_PORT:-443}:443"
      - "${TC_HTTP_PORT:-80}:80"
    read_only: true
    tmpfs:
      - /tmp:size=10m,noexec,nosuid,nodev
      - /var/cache/nginx:size=50m
      - /var/run:size=5m
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./error-pages:/usr/share/nginx/error-pages:ro
    depends_on:
      threatclaw-core:
        condition: service_healthy
      threatclaw-dashboard:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 explicitly — Alpine busybox wget resolves "localhost" to IPv6 ::1
      # but nginx listens on IPv4 0.0.0.0 only (see docker/nginx.conf listen directives).
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:443/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.25"
    networks:
      - threatclaw-frontend
    logging: *default-logging
    labels:
      - "com.threatclaw.role=proxy"
      - "com.threatclaw.security=high"

  # ── Docker Socket Proxy — filtered API access (See ADR-042) ──
  docker-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      POST: 1
      CONTAINERS: 1
      IMAGES: 1
      EVENTS: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      EXEC: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
      LOG_LEVEL: warning
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges=true"
    read_only: true
    tmpfs:
      - /run:size=1m
    networks:
      - docker-proxy-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"
    logging: *default-logging

# ── Networks ────────────────────────────────────────────────
# 5 isolated networks — principle of least privilege
#
# NDR sources (Zeek, Strelka, Suricata) are NOT bundled here.
# ThreatClaw receives their data via webhooks — the client installs
# and operates these tools independently. Configuration guides are
# available in the Dashboard → Sources page.
# Reference configs shipped in docker/zeek/ and docker/fluent-bit-zeek.conf.
networks:
  threatclaw-internal:
    driver: bridge
    internal: true    # No internet — DB, ML, Fluent-bit, inter-service
  threatclaw-frontend:
    driver: bridge    # Nginx + Dashboard + Core — proxied to outside
  threatclaw-egress:
    driver: bridge    # Core + Ollama — outbound internet (APIs, model downloads)
  threatclaw-ollama:
    driver: bridge
    internal: true    # No internet — only Core ↔ Ollama (API isolation)
  docker-proxy-net:
    driver: bridge
    internal: true    # No internet — only Core ↔ Docker socket proxy
  wazuh-net:
    external: true
    name: wazuh_wazuh-net   # External Wazuh stack (optional; create empty if absent)

# ── Volumes ─────────────────────────────────────────────────
volumes:
  pgdata:             # PostgreSQL data (persist across restarts)
  core-data:          # Core runtime data (memory, workspace)
  ollama-data:        # LLM model weights (~5-20GB per model)
  shared-config:      # Auth token shared between core and dashboard
  ml-models:          # ML model weights

# ── Secrets — See ADR-039, ADR-040 ────────────────────────
# Mounted as /run/secrets/<name> — never visible in docker inspect
secrets:
  tc_db_password:
    file: ./secrets/tc_db_password.txt
  tc_auth_token:
    file: ./secrets/tc_auth_token.txt
