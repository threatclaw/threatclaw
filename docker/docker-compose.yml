# ╔══════════════════════════════════════════════════════════════╗
# ║  ThreatClaw v0.5.0 — Plug-and-Play Docker Stack            ║
# ║                                                              ║
# ║  Usage:  docker compose up -d                                ║
# ║  That's it. Everything starts, configures, and connects.     ║
# ║                                                              ║
# ║  Dashboard: http://localhost:3001                             ║
# ║  API:       http://localhost:3000                             ║
# ║  All data stays on-premise (Model B+)                        ║
# ╚══════════════════════════════════════════════════════════════╝

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Core API (Rust) ──────────────────────────────────────
  # The brain: ReAct reasoning, LLM orchestration, skill execution
  threatclaw-core:
    image: threatclaw/core:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["/app/docker/entrypoint.sh"]
    ports:
      - "${TC_CORE_PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: postgres://threatclaw:${TC_DB_PASSWORD:-threatclaw}@threatclaw-db:5432/threatclaw
      POSTGRES_USER: threatclaw
      POSTGRES_PASSWORD: ${TC_DB_PASSWORD:-threatclaw}
      POSTGRES_DB: threatclaw
      TC_DB_HOST: threatclaw-db
      TC_DB_PORT: "5432"
      # Redis removed — cooldowns use PostgreSQL settings table
      # LLM
      LLM_BACKEND: ollama
      OLLAMA_MODEL: ${TC_LLM_MODEL:-threatclaw-l1}
      OLLAMA_BASE_URL: http://ollama:11434
      FORENSIC_MODEL: ${TC_FORENSIC_MODEL:-threatclaw-l2}
      TC_AUTO_PULL_MODELS: "${TC_AUTO_PULL_MODELS:-true}"
      TC_L1_MODEL: ${TC_L1_BASE_MODEL:-qwen3:8b}
      # Gateway
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "3000"
      GATEWAY_AUTH_TOKEN: ${TC_AUTH_TOKEN:-}
      HTTP_HOST: "0.0.0.0"
      ONBOARD_COMPLETED: "true"
      # App config
      RUST_LOG: info
      TC_PERMISSION_LEVEL: ${TC_PERMISSION_LEVEL:-ALERT_ONLY}
      TC_INSTANCE_NAME: ${TC_INSTANCE_NAME:-threatclaw}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # Cloud LLM (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    volumes:
      - ../AGENT_SOUL.toml:/app/AGENT_SOUL.toml:ro
      - ../threatclaw.toml:/app/threatclaw.toml:ro
      - ./Modelfile.threatclaw-l1:/app/docker/Modelfile.threatclaw-l1:ro
      - ./Modelfile.threatclaw-l2:/app/docker/Modelfile.threatclaw-l2:ro
      - ./entrypoint.sh:/app/docker/entrypoint.sh:ro
      - core-data:/app/data
      - shared-config:/shared
    depends_on:
      threatclaw-db:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    networks:
      - threatclaw-internal
      - threatclaw-frontend
    logging: *default-logging
    labels:
      - "com.threatclaw.role=core"
      - "com.threatclaw.security=high"

  # ── Dashboard (Next.js) ──────────────────────────────────
  # Web UI: config, monitoring, skills, agent control
  threatclaw-dashboard:
    image: threatclaw/dashboard:latest
    build:
      context: ../dashboard
      dockerfile: ../docker/Dockerfile.dashboard
    ports:
      - "${TC_DASHBOARD_PORT:-3001}:3000"
    environment:
      TC_CORE_URL: http://threatclaw-core:3000
      TC_CORE_TOKEN: ${TC_AUTH_TOKEN:-}
    volumes:
      - shared-config:/shared:ro
    depends_on:
      threatclaw-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - threatclaw-internal
      - threatclaw-frontend
    logging: *default-logging
    labels:
      - "com.threatclaw.role=dashboard"

  # ── PostgreSQL + pgvector + Apache AGE ───────────────────
  # Data: settings, findings, alerts, audit, memory, CVE cache
  # Graph: threat correlation, investigation paths, STIX data model
  threatclaw-db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: threatclaw/db:latest
    environment:
      POSTGRES_DB: threatclaw
      POSTGRES_USER: threatclaw
      POSTGRES_PASSWORD: ${TC_DB_PASSWORD:-threatclaw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatclaw -d threatclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Ollama — Local LLM ──────────────────────────────────
  # L1 (triage) + L2 (forensic) models, GPU accelerated
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "4.0"
        # GPU acceleration (optional — works without NVIDIA runtime)
        # Uncomment below if you have an NVIDIA GPU:
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: all
        #       capabilities: [gpu]
    networks:
      - threatclaw-internal
    logging: *default-logging
    labels:
      - "com.threatclaw.role=llm"

  # ── Nuclei — CVE Scanner ────────────────────────────────
  # On-demand vulnerability scanning via exec
  nuclei:
    image: projectdiscovery/nuclei:latest
    volumes:
      - nuclei-data:/root/.local/nuclei
    entrypoint: ["tail", "-f", "/dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "nuclei --version || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Trivy — Container/Image Scanner ─────────────────────
  # Server mode: receives scan requests from core
  trivy:
    image: aquasec/trivy:latest
    command: ["server", "--listen", "0.0.0.0:4954"]
    volumes:
      - trivy-cache:/root/.cache/trivy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4954/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── Fluent Bit — Syslog & Log Collector ─────────────────
  # Ingests syslog (514), Docker logs (24224), forwards to PostgreSQL
  fluent-bit:
    image: fluent/fluent-bit:latest
    ports:
      - "${TC_SYSLOG_PORT:-514}:514/udp"
      - "${TC_SYSLOG_PORT:-514}:514/tcp"
      - "127.0.0.1:5140:5140/udp"
      - "127.0.0.1:24224:24224"
    environment:
      TC_DB_PASSWORD: ${TC_DB_PASSWORD:-threatclaw}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/log:/var/log/host:ro
    depends_on:
      threatclaw-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2020/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    networks:
      - threatclaw-internal
    logging: *default-logging

  # ── ML Engine — Behavioral Analysis ──────────────────────
  # Isolation Forest, DGA detection, DBSCAN clustering
  # Scores every 5 min, retrains nightly at 03:00
  ml-engine:
    build:
      context: ../ml-engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://threatclaw:${TC_DB_PASSWORD:-threatclaw}@threatclaw-db:5432/threatclaw
      ML_MODEL_DIR: /models
    volumes:
      - ml-models:/models
    depends_on:
      threatclaw-db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - threatclaw-internal
    logging: *default-logging
    labels:
      - "com.threatclaw.role=ml-engine"

# ── Networks ────────────────────────────────────────────────
networks:
  threatclaw-internal:
    driver: bridge
    internal: true    # No external access — all inter-service communication
  threatclaw-frontend:
    driver: bridge    # Dashboard + Core exposed to host

# ── Volumes ─────────────────────────────────────────────────
volumes:
  pgdata:             # PostgreSQL data (persist across restarts)
  core-data:          # Core runtime data (memory, workspace)
  ollama-data:        # LLM model weights (~5-20GB per model)
  nuclei-data:        # Nuclei templates cache
  trivy-cache:        # Trivy vulnerability DB cache
  shared-config:      # Auth token shared between core and dashboard
  ml-models:          # ML model weights (Isolation Forest, DGA Random Forest)
