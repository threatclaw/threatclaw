# Fluent-Bit config for Zeek JSON log forwarding to ThreatClaw.
# Reads Zeek logs from /opt/zeek/logs/current/ and forwards to webhook.
# Activated only with profile: ndr

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info

# Read Zeek conn.log (JSON)
[INPUT]
    Name          tail
    Tag           zeek.conn
    Path          /opt/zeek/logs/current/conn.log
    Parser        json
    Refresh_Interval 5
    Read_from_Head Off

# Read Zeek dns.log
[INPUT]
    Name          tail
    Tag           zeek.dns
    Path          /opt/zeek/logs/current/dns.log
    Parser        json
    Refresh_Interval 5

# Read Zeek ssl.log
[INPUT]
    Name          tail
    Tag           zeek.ssl
    Path          /opt/zeek/logs/current/ssl.log
    Parser        json
    Refresh_Interval 5

# Read Zeek http.log
[INPUT]
    Name          tail
    Tag           zeek.http
    Path          /opt/zeek/logs/current/http.log
    Parser        json
    Refresh_Interval 5

# Read Zeek files.log
[INPUT]
    Name          tail
    Tag           zeek.files
    Path          /opt/zeek/logs/current/files.log
    Parser        json
    Refresh_Interval 5

# Read Zeek ssh.log
[INPUT]
    Name          tail
    Tag           zeek.ssh
    Path          /opt/zeek/logs/current/ssh.log
    Parser        json
    Refresh_Interval 5

# Read Zeek notice.log (BZAR, anomalous-dns, long-connections alerts)
[INPUT]
    Name          tail
    Tag           zeek.notice
    Path          /opt/zeek/logs/current/notice.log
    Parser        json
    Refresh_Interval 5

# Read Zeek smb_files.log (ransomware detection)
[INPUT]
    Name          tail
    Tag           zeek.smb_files
    Path          /opt/zeek/logs/current/smb_files.log
    Parser        json
    Refresh_Interval 5

# Forward all Zeek logs to ThreatClaw webhook
[OUTPUT]
    Name          http
    Match         zeek.*
    Host          threatclaw-core
    Port          3000
    URI           /api/tc/webhook/ingest/zeek
    Format        json
    Header        Content-Type application/json
    Header        Authorization Bearer ${TC_AUTH_TOKEN}
    Retry_Limit   3
    tls           Off
