# ──────────────────────────────────────────────────────────────────────────────
# ThreatClaw — Nginx Reverse Proxy Configuration
#
# Routes:
#   /        -> dashboard (Next.js on port 3000)
#   /api/    -> core (Rust API on port 18789)
#
# Features:
#   - HTTPS termination with self-signed or user-provided certificate
#   - Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   - Rate limiting on API endpoints
#   - Gzip compression
#   - WebSocket support for dashboard live updates
# ──────────────────────────────────────────────────────────────────────────────

# Worker configuration
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # ── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Rate Limiting ────────────────────────────────────────────────────
    # API rate limit: 30 requests/second per IP with burst of 60
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Login/auth rate limit: stricter — 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # General rate limit: 60 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

    limit_req_status 429;

    # ── Upstream Backends ────────────────────────────────────────────────
    upstream dashboard {
        server threatclaw-dashboard:3000;
        keepalive 16;
    }

    upstream core_api {
        server threatclaw-core:18789;
        keepalive 16;
    }

    # ── HTTP -> HTTPS Redirect ───────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Allow health checks over HTTP
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # ── TLS Configuration ────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/threatclaw.crt;
        ssl_certificate_key /etc/nginx/certs/threatclaw.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling (only works with CA-signed certificates)
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # ── Security Headers ────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'self';" always;

        # Hide server version
        server_tokens off;

        # ── Health Check ─────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── API Proxy (/api/) ────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            # Strip /api prefix before forwarding to core
            rewrite ^/api/(.*) /$1 break;

            proxy_pass http://core_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts for long-running API calls (scans, etc.)
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # WebSocket support for streaming responses
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Do not buffer API responses (important for streaming)
            proxy_buffering off;
        }

        # ── API Health endpoint (no rate limit) ──────────────────────────
        location = /api/health {
            access_log off;

            rewrite ^/api/(.*) /$1 break;

            proxy_pass http://core_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Dashboard Proxy (/) ──────────────────────────────────────────
        location / {
            limit_req zone=general_limit burst=120 nodelay;

            proxy_pass http://dashboard;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js HMR and live updates
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Next.js Static Assets ────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Cache static assets aggressively
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Deny access to hidden files ──────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
