spec_version: cacao-2.0
name: security-log-cleared
description: |
  Sigma "Security Log Cleared" (win-auth-009) : event 1102 — l'audit log
  Windows a ete vide. C'est un signal canonique d'attaquant qui couvre
  ses traces apres une attaque reussie.

  Toujours INCIDENT critical. Pas d'auto-action automatisable —
  l'investigation doit etre menee par l'humain (forensic).
trigger:
  sigma_rule: win-auth-009
steps:
  start:
    type: start
    on_completion: emit_incident
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: critical
      proposed_actions:
        - cmd_id: velociraptor_isolate_host
          rationale: "Audit log Windows vide — l'asset doit etre isole, scope d'attaque inconnu"
          requires_hitl: true
        - cmd_id: velociraptor_collect_artifacts
          rationale: "Collecter les autres logs (evtx services, applications, syslog) avant qu'ils soient touches"
          requires_hitl: true
    on_completion: terminal
  terminal:
    type: end
