spec_version: cacao-2.0
name: udp-amplification-block
description: |
  Sigma "Block UDP amplification probe" : sondes DNS/NTP/CharGen/SSDP
  bloquees. Pattern bruit — quasi toujours du scan Internet, jamais
  actionnable au niveau d'une PME.

  Archive systematique sauf burst extreme (>= 50 en 5 min — DDoS reflexion
  cible TC en victime indirecte).
trigger:
  sigma_rule: opnsense-fw-004
steps:
  start:
    type: start
    on_completion: check_extreme_burst
  check_extreme_burst:
    type: if-condition
    condition: "signals.recent_count_5m >= 50"
    on_true: route_llm
    on_false: archive_noise
  route_llm:
    type: action
    command:
      type: threatclaw-investigate-llm
      timeout_secs: 1500
    on_completion: terminal
  archive_noise:
    type: action
    command:
      type: threatclaw-archive
      reason: "bruit Internet — sondes UDP amplification bloquees"
    on_completion: terminal
  terminal:
    type: end
