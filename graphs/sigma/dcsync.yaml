spec_version: cacao-2.0
name: dcsync
description: |
  Sigma "DCSync — Directory Replication" (win-auth-003) : un asset non-DC
  demande une replication AD. Quasi-impossible que ce soit legitime :
  seuls les DC se repliquent entre eux, et ce sont des assets clairement
  identifies dans le graph.

  Toujours INCIDENT critical — l'attaquant est en train de dump tout
  l'AD. Action HITL : isoler l'asset source + reset le compte qui a
  emis la requete.
trigger:
  sigma_rule: win-auth-003
steps:
  start:
    type: start
    on_completion: emit_incident
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: critical
      proposed_actions:
        - cmd_id: velociraptor_isolate_host
          rationale: "DCSync depuis un asset non-DC — isoler immediatement"
          requires_hitl: true
        - cmd_id: ad_reset_password
          rationale: "Reset le compte qui a emis la replication"
          requires_hitl: true
    on_completion: terminal
  terminal:
    type: end
