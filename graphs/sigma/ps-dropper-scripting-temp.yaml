spec_version: cacao-2.0
name: ps-dropper-scripting-temp
description: |
  Wazuh "PowerShell cree un fichier script dans Temp ou dossier utilisateur"
  (rule_id wazuh-92201, level medium). Pattern : un process powershell.exe
  ecrit un .ps1, .vbs, .js ou .hta dans %TEMP% ou %APPDATA%\Local.

  Taux de faux positifs non negligeable : installateurs Chocolatey, mises
  a jour Office, antivirus EDR, game launchers — tous peuvent creer des
  scripts temporaires. La strategie est donc contextuelle :

  - Burst (>= 3 creations de scripts en 5 min) → staging malware
    multi-fichiers : les installateurs legitimes creent rarement plus de
    2 scripts en rafale, cette densite est caracteristique d'un dropper.
    INCIDENT critical + collecte.
  - Depot isole sur asset critique (score >= 7) → meme un seul script
    PowerShell inconnu sur un DC ou serveur de fichiers est inacceptable.
    INCIDENT high + collecte. Pas d'isolation automatique : on verifie
    d'abord (peut etre un batch Ansible qui a rate).
  - Depot isole sur asset standard → route LLM : le contexte (nom du
    fichier, process parent, heure, utilisateur) permet au L2 de
    trancher installateur vs stager en quelques secondes.
trigger:
  sigma_rule: wazuh-92201
steps:
  start:
    type: start
    on_completion: check_burst
  check_burst:
    type: if-condition
    condition: "signals.recent_count_5m >= 3"
    on_true: emit_incident_staging
    on_false: check_critical_asset
  check_critical_asset:
    type: if-condition
    condition: "asset.criticality_score >= 7"
    on_true: emit_incident_critical_asset
    on_false: route_llm
  emit_incident_staging:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: critical
      proposed_actions:
        - cmd_id: velociraptor_collect_artifacts
          rationale: "Multiples scripts PowerShell deposes en rafale dans Temp — collecter contenu des fichiers, process parent, connexions reseau et historique PS"
          requires_hitl: true
    on_completion: terminal
  emit_incident_critical_asset:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: high
      proposed_actions:
        - cmd_id: velociraptor_collect_artifacts
          rationale: "Script PowerShell inconnu cree dans Temp sur asset critique — collecter le fichier, le process parent et le PS transcript pour qualification"
          requires_hitl: true
    on_completion: terminal
  route_llm:
    type: action
    command:
      type: threatclaw-investigate-llm
      timeout_secs: 1500
    on_completion: terminal
  terminal:
    type: end
