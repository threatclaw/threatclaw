spec_version: cacao-2.0
name: powershell-reverse-shell
description: |
  Sigma "PowerShell Reverse Shell" (ps-obfusc-020) : pattern
  TCPClient + StreamReader + StreamWriter ou New-Object Net.Sockets.TcpClient
  detecte. Pas d'usage legitime — c'est l'archetype reverse shell.

  Toujours INCIDENT critical.
trigger:
  sigma_rule: ps-obfusc-020
steps:
  start:
    type: start
    on_completion: emit_incident
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: critical
      proposed_actions:
        - cmd_id: velociraptor_isolate_host
          rationale: "Reverse shell PowerShell — isoler immediatement"
          requires_hitl: true
        - cmd_id: velociraptor_kill_process
          rationale: "Tuer le process PowerShell qui execute le reverse shell"
          requires_hitl: true
    on_completion: terminal
  terminal:
    type: end
