spec_version: cacao-2.0
name: opnsense-auth-failed
description: |
  Sigma "OPNsense auth failed" : meme logique que fortinet-auth-failed
  pour OPNsense. Tout admin firewall est critique de facto.
trigger:
  sigma_rule: opnsense-001
steps:
  start:
    type: start
    on_completion: check_burst
  check_burst:
    type: if-condition
    condition: "signals.recent_count_5m >= 3"
    on_true: emit_incident
    on_false: archive_typo
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: high
      proposed_actions:
        - cmd_id: opnsense_block_ip
          rationale: "Brute force admin OPNsense confirme — bloquer la source"
          requires_hitl: true
    on_completion: terminal
  archive_typo:
    type: action
    command:
      type: threatclaw-archive
      reason: "echec d'auth admin isole — probable typo"
    on_completion: terminal
  terminal:
    type: end
