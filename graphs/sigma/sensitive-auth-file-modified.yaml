spec_version: cacao-2.0
name: sensitive-auth-file-modified
description: |
  Sigma "Sensitive Auth File Modified" (lnx-fim-001) : modification de
  /etc/shadow, /etc/sudoers, /root/.ssh/authorized_keys. Beaucoup de
  bruit (ansible, pkg upgrade), donc on segmente :

  - Asset critique → INCIDENT (impact potentiel grave, on signale)
  - Sinon → archive (probable provisioning hors-fenetre)
trigger:
  sigma_rule: lnx-fim-001
steps:
  start:
    type: start
    on_completion: check_criticality
  check_criticality:
    type: if-condition
    condition: "asset.criticality_score >= 7"
    on_true: emit_incident
    on_false: archive_likely_legit
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: high
      proposed_actions:
        - cmd_id: velociraptor_collect_artifacts
          rationale: "Collecter le diff du fichier modifie + auth.log + bash_history"
          requires_hitl: true
    on_completion: terminal
  archive_likely_legit:
    type: action
    command:
      type: threatclaw-archive
      reason: "modification fichier auth sur asset non-critique — probable provisioning"
    on_completion: terminal
  terminal:
    type: end
