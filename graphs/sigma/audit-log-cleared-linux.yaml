spec_version: cacao-2.0
name: audit-log-cleared-linux
description: |
  Sigma "Audit / System Log Cleared" (lnx-evasion-003) : auditd / syslog
  vide. Equivalent Linux du Security Log Cleared Windows. Toujours
  malveillant — un admin legitime ne vide pas les logs.

  Toujours INCIDENT critical.
trigger:
  sigma_rule: lnx-evasion-003
steps:
  start:
    type: start
    on_completion: emit_incident
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: critical
      proposed_actions:
        - cmd_id: velociraptor_isolate_host
          rationale: "Audit log Linux vide — l'attaquant couvre ses traces"
          requires_hitl: true
        - cmd_id: velociraptor_collect_artifacts
          rationale: "Collecter les autres logs (kern.log, dmesg, journalctl) avant qu'ils soient effaces"
          requires_hitl: true
    on_completion: terminal
  terminal:
    type: end
