spec_version: cacao-2.0
name: rdp-bruteforce
description: |
  Sigma "RDP Lateral Movement" (win-auth-010) : volume RDP eleve sur un
  asset Windows. Si volume confirme + asset critique, c'est probablement
  une lateralisation post-compromis.

  - Volume corrobore (>= 5 en 5 min) + asset critique → INCIDENT (block_ip
    + reset password compte cible)
  - Volume corrobore mais asset isole → archive (non corrobore)
  - Sinon → route LLM
trigger:
  sigma_rule: win-auth-010
steps:
  start:
    type: start
    on_completion: check_count
  check_count:
    type: if-condition
    condition: "signals.recent_count_5m >= 5"
    on_true: check_asset_known
    on_false: route_llm
  check_asset_known:
    type: if-condition
    condition: "graph.asset_in_graph"
    on_true: check_criticality
    on_false: archive_isolated
  check_criticality:
    type: if-condition
    condition: "asset.criticality_score >= 7"
    on_true: emit_incident
    on_false: route_llm
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: high
      proposed_actions:
        - cmd_id: opnsense_block_ip
          rationale: "RDP brute force confirme sur asset critique — bloquer la source"
          requires_hitl: true
        - cmd_id: ad_reset_password
          rationale: "Reset le compte cible si la source connaissait un username valide"
          requires_hitl: true
    on_completion: terminal
  archive_isolated:
    type: action
    command:
      type: threatclaw-archive
      reason: "non corrobore — asset isolee du graph d'assets"
    on_completion: terminal
  route_llm:
    type: action
    command:
      type: threatclaw-investigate-llm
      timeout_secs: 1500
    on_completion: terminal
  terminal:
    type: end
