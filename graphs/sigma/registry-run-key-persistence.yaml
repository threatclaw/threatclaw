spec_version: cacao-2.0
name: registry-run-key-persistence
description: |
  Sigma "PowerShell Registry Run Key Persistence" (ps-obfusc-019) : un
  process PowerShell ecrit dans Run / RunOnce. Pattern persistance
  Windows classique. Souvent malveillant mais peut etre un installer
  legitime.

  - Asset critique → INCIDENT (collecter le contexte avant intervention)
  - Asset non-critique → route LLM (le LLM regarde le path, le binaire,
    le compte qui ecrit)
trigger:
  sigma_rule: ps-obfusc-019
steps:
  start:
    type: start
    on_completion: check_criticality
  check_criticality:
    type: if-condition
    condition: "asset.criticality_score >= 7"
    on_true: emit_incident
    on_false: route_llm
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: high
      proposed_actions:
        - cmd_id: velociraptor_collect_artifacts
          rationale: "Collecter le binaire pointe par la run key + autoruns + history PS"
          requires_hitl: true
    on_completion: terminal
  route_llm:
    type: action
    command:
      type: threatclaw-investigate-llm
      timeout_secs: 1500
    on_completion: terminal
  terminal:
    type: end
