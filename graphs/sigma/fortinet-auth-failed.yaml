spec_version: cacao-2.0
name: fortinet-auth-failed
description: |
  Sigma "FortiGate auth failed" : echec d'auth admin FortiGate. Le
  firewall lui-meme est une cible de premier ordre — toute compromission
  d'admin FortiGate = compromission de tout l'inventaire visible.

  - Burst (>= 3 echecs en 5 min) → INCIDENT immediate (asset toujours
    critique pour un firewall)
  - Hit isole → archive (probablement un admin qui se trompe de pwd)
trigger:
  sigma_rule: fortinet-001
steps:
  start:
    type: start
    on_completion: check_burst
  check_burst:
    type: if-condition
    condition: "signals.recent_count_5m >= 3"
    on_true: emit_incident
    on_false: archive_typo
  emit_incident:
    type: action
    command:
      type: threatclaw-emit-incident
      severity: high
      proposed_actions:
        - cmd_id: fortinet_block_ip
          rationale: "Brute force admin firewall confirme — bloquer la source au plus vite"
          requires_hitl: true
    on_completion: terminal
  archive_typo:
    type: action
    command:
      type: threatclaw-archive
      reason: "echec d'auth admin isole — probable typo, on garde en logs"
    on_completion: terminal
  terminal:
    type: end
