# Local development only — do NOT use these credentials in production.
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: threatclaw
      POSTGRES_USER: threatclaw
      POSTGRES_PASSWORD: threatclaw  # dev-only, change for any non-local deployment
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
