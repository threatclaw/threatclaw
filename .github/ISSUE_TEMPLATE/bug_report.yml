name: Bug Report
description: Report a bug in ThreatClaw
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
  - type: input
    id: version
    attributes:
      label: ThreatClaw version
      placeholder: v0.2.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Debian 13, Ubuntu 24.04
