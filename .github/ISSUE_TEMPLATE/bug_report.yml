name: Bug Report
description: Report a bug in ThreatClaw
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ThreatClaw is affected?
      options:
        - Dashboard (Web UI)
        - Backend (Core engine)
        - ML Engine
        - Skills
        - Docker / Installation
        - LLM / Conversational (L0)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ThreatClaw version
      placeholder: v1.0.10-beta
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - Docker (one-liner installer)
        - Docker (manual)
        - From source
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Debian 13, Ubuntu 24.04
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      description: Paste any relevant logs (docker logs, browser console, etc.)
      render: shell
