name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Public docs leak check
        run: bash scripts/check-public-docs.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Core image — the only Rust build in the whole workflow. The release
          # binary below is extracted from this image so it always matches what
          # ghcr publishes, bit for bit.
          docker build -t "ghcr.io/threatclaw/core:${VERSION}" \
                       -t ghcr.io/threatclaw/core:latest \
                       -f Dockerfile .
          docker build -t "ghcr.io/threatclaw/dashboard:${VERSION}" \
                       -t ghcr.io/threatclaw/dashboard:latest \
                       -f dashboard/Dockerfile ./dashboard
          docker push "ghcr.io/threatclaw/core:${VERSION}"
          docker push ghcr.io/threatclaw/core:latest
          docker push "ghcr.io/threatclaw/dashboard:${VERSION}"
          docker push ghcr.io/threatclaw/dashboard:latest

      - name: Extract release binary from core image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          cid=$(docker create "ghcr.io/threatclaw/core:${VERSION}")
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$cid:/usr/local/bin/threatclaw" ./threatclaw-linux-amd64
          # Fail hard if the image layout changed and we extracted nothing useful.
          test -s ./threatclaw-linux-amd64
          file ./threatclaw-linux-amd64 | grep -q "ELF 64-bit"
          chmod +x ./threatclaw-linux-amd64

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          CHANGELOG=""
          if [ -f CHANGELOG.md ]; then
            # awk with variable binding keeps VERSION out of any regex parser
            CHANGELOG=$(awk -v ver="$VERSION" '
              $0 ~ "^## .*" ver { p=1; print; next }
              p && /^## / { exit }
              p { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$CHANGELOG" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            else
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
            fi
          fi
          printf '%s\n' "$CHANGELOG" > /tmp/release-notes.md

      - name: Package release asset
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Binary was already extracted from the published image in the
          # Extract step — just archive it for the GitHub Release attachment.
          tar czf "threatclaw-${VERSION}-linux-amd64.tar.gz" \
            threatclaw-linux-amd64

      - name: Delete existing Release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release delete "$REF_NAME" -R "$GITHUB_REPOSITORY" --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ThreatClaw v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            threatclaw-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
