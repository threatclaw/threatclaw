name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          cargo audit 2>&1 || true

          # Fail on critical security packages
          for pkg in wasmtime ring argon2; do
            if cargo audit 2>&1 | grep -i "$pkg.*RUSTSEC"; then
              echo "::error::SECURITY: CVE on $pkg"
              exit 1
            fi
          done
          echo "No critical CVEs on security packages"

  check-upstream:
    name: Check IronClaw Upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for upstream updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(cat UPSTREAM_VERSION | tr -d '[:space:]')
          LATEST=$(gh api repos/nearai/ironclaw/releases/latest --jq '.tag_name' 2>/dev/null || echo "$CURRENT")

          if [ "$CURRENT" != "$LATEST" ]; then
            NOTES=$(gh api repos/nearai/ironclaw/releases/latest --jq '.body' 2>/dev/null || echo "")
            gh issue create \
              --title "IronClaw upstream update: $LATEST" \
              --body "Current: $CURRENT | New: $LATEST

$NOTES

- [ ] Review changelog
- [ ] Merge relevant changes
- [ ] Update UPSTREAM_VERSION" \
              --label "upstream-update" || echo "Issue creation skipped"
          else
            echo "Fork is up to date"
          fi
