name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          cargo audit 2>&1 || true

          # Fail on critical security packages
          for pkg in wasmtime ring argon2; do
            if cargo audit 2>&1 | grep -i "$pkg.*RUSTSEC"; then
              echo "::error::SECURITY: CVE on $pkg"
              exit 1
            fi
          done
          echo "No critical CVEs on security packages"

  # Upstream sync check — run locally, not in public CI
  # See internal/ADR/ for details
